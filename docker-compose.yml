services:
  db:
    image: postgres:16-bookworm
    container_name: pet-robot-db
    environment:
      POSTGRES_DB: pet_robot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pet_robot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pet-robot-backend
    env_file:
      - path: ./backend/.env.local
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 3002
      STORAGE_MODE: postgres
      DATABASE_URL: postgresql://postgres:postgres@db:5432/pet_robot
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3002"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://backend:3002
    container_name: pet-robot-frontend
    environment:
      API_PROXY_TARGET: http://backend:3002
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/setup').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
